<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALOR | Minimalist FPS</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-white overflow-hidden select-none font-sans antialiased">

    <!-- 3D Canvas -->
    <div id="game-container" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-8">
        
        <!-- Top HUD -->
        <div class="flex justify-between items-start opacity-0 transition-opacity duration-500" id="hud-top">
            <div class="flex items-center gap-4 bg-zinc-900/50 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/5">
                <div class="text-emerald-400 font-bold text-2xl" id="score-ally">0</div>
                <div class="h-6 w-px bg-white/10"></div>
                <div class="text-rose-400 font-bold text-2xl" id="score-enemy">0</div>
            </div>
            
            <div class="flex flex-col items-end gap-2">
                <div class="bg-zinc-900/50 backdrop-blur-md px-4 py-2 rounded-xl border border-white/5 text-xs tracking-widest text-zinc-400 uppercase">
                    Protocol <span class="text-white font-bold">ALPHA</span>
                </div>
            </div>
        </div>

        <!-- Crosshair -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-0" id="crosshair">
            <div class="relative w-6 h-6 flex items-center justify-center">
                <div class="w-1 h-1 bg-white rounded-full shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
                <div class="absolute w-8 h-px bg-white/20"></div>
                <div class="absolute h-8 w-px bg-white/20"></div>
            </div>
        </div>

        <!-- Bottom HUD -->
        <div class="flex justify-between items-end opacity-0 transition-opacity duration-500" id="hud-bottom">
            <!-- Health -->
            <div class="flex flex-col gap-2">
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-bold tracking-tighter" id="health-display">100</span>
                    <span class="text-sm text-zinc-500 font-medium">HP</span>
                </div>
                <div class="w-48 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="health-bar" class="h-full bg-emerald-500 w-full transition-all duration-300"></div>
                </div>
            </div>

            <!-- Ammo -->
            <div class="flex flex-col items-end gap-1">
                <div class="flex items-baseline gap-1">
                    <span class="text-5xl font-bold tracking-tighter" id="ammo-current">25</span>
                    <span class="text-2xl text-zinc-600">/</span>
                    <span class="text-2xl text-zinc-600" id="ammo-max">∞</span>
                </div>
                <div class="flex gap-1" id="ammo-pips">
                    <!-- JS will populate pips -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="absolute inset-0 z-50 flex items-center justify-center bg-zinc-950/80 backdrop-blur-xl transition-all duration-700">
        <div class="max-w-md w-full text-center space-y-8 p-12 relative">
            <div class="absolute inset-0 bg-gradient-to-tr from-emerald-500/10 to-rose-500/10 rounded-full blur-3xl opacity-20 animate-pulse"></div>
            
            <div class="relative space-y-2">
                <h1 class="text-6xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-zinc-500">VALOR</h1>
                <p class="text-zinc-500 tracking-[0.2em] text-sm uppercase">Tactical Simulation</p>
            </div>

            <div class="space-y-3 pt-8">
                <button id="btn-start" class="group relative w-full bg-white text-black h-12 rounded-lg font-bold tracking-wide hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 overflow-hidden">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        <i data-lucide="crosshair" class="w-4 h-4"></i> DEPLOY
                    </span>
                    <div class="absolute inset-0 bg-zinc-200 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></div>
                </button>
                
                <div class="text-xs text-zinc-600 pt-4 flex justify-center gap-4">
                    <span>WASD to Move</span>
                    <span>•</span>
                    <span>CLICK to Shoot</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="text-center space-y-6">
            <h2 id="end-title" class="text-5xl font-bold tracking-tighter text-white">VICTORY</h2>
            <p id="end-stats" class="text-zinc-400">Enemies Eliminated: 0</p>
            <button id="btn-restart" class="px-8 py-3 bg-zinc-800 hover:bg-zinc-700 text-white rounded-lg transition-colors border border-white/10">
                REINITIALIZE
            </button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
